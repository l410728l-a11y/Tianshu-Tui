name: 功能请求 · Feature Request
description: 提议新功能或改进 · Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题 · Problem
      description: 描述场景与痛点,而不只是方案
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的行为 · Desired Behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案 · Alternatives Considered
      description: 现有 slash 命令 / 配置 / 插件是否已能部分满足?
  - type: dropdown
    id: kind
    attributes:
      label: 类型 · Kind
      options:
        - TUI 交互
        - 桌面端
        - Agent 能力(工具/hook/委派)
        - 模型/提供商支持
        - 插件系统
        - 其他
