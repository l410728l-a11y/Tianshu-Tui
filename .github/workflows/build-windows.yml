name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'desktop/**'
      - 'src/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install rivet runtime deps
        working-directory: .
        run: npm ci

      - name: Build rivet runtime
        working-directory: .
        run: npm run build

      - name: Install desktop frontend deps
        working-directory: desktop
        run: npm ci

      - name: Fetch bundled Node runtime
        working-directory: desktop
        run: node scripts/fetch-node-runtime.js

      - name: Build Tauri app (Windows)
        working-directory: desktop
        run: npx tauri build
        env:
          # 未配置签名证书时构建未签名安装包；配置 secrets 后自动签名。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows 代码签名（可选）
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload installer + signature
        uses: actions/upload-artifact@v4
        with:
          name: tianshu-windows-installer
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: warn

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: tianshu-windows-exe
          path: |
            desktop/src-tauri/target/release/*.exe
          if-no-files-found: warn

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          draft: true
